<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Overview</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header Section -->
  <header class="bg-white shadow py-4">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-700">Coffee Details</h1>
      <a href="/" class="text-blue-500 hover:underline">Back to Dashboard</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-6 py-12">
    <!-- Coffee Information Card -->
    <div class="bg-white shadow-lg rounded-lg p-6">
      <div class="flex flex-col md:flex-row md:items-center">
        <!-- Coffee Name and Roaster -->
        <div class="md:flex-1">
          <h2 class="text-3xl font-bold text-gray-800 mb-2" id="coffee-name">Ethiopian Yirgacheffe</h2>
          <p class="text-gray-600 text-sm mb-4">
            Roasted by <span id="coffee-roaster" class="font-semibold">Sunrise Roasters</span>
          </p>
          <a href="#" id="coffee-url" class="text-blue-500 hover:underline text-sm">Visit Roaster Website</a>
        </div>
        <!-- Roast and Origin Details -->
        <div class="md:flex-1 mt-4 md:mt-0">
          <p class="text-gray-600">
            <span class="font-semibold">Origin:</span> <span id="coffee-origin">Ethiopia, Yirgacheffe</span>
          </p>
          <p class="text-gray-600 mt-2">
            <span class="font-semibold">Processing Method:</span> <span id="coffee-process">Washed</span>
          </p>
          <p class="text-gray-600 mt-2">
            <span class="font-semibold">Roast Level:</span> <span id="coffee-roast-level">Light</span>
          </p>
        </div>
      </div>
    </div>

    <!-- Flavor Notes Section -->
    <section class="mt-8">
      <h3 class="text-2xl font-bold mb-4">Flavor Notes</h3>
      <ul id="flavor-notes" class="bg-white shadow-lg rounded-lg p-6">
        <li class="text-gray-600 py-1">Citrus</li>
        <li class="text-gray-600 py-1">Floral</li>
        <li class="text-gray-600 py-1">Bergamot</li>
      </ul>
    </section>
  </main>

  <!-- Footer Section -->
  <footer class="bg-gray-900 text-white py-6">
    <div class="container mx-auto text-center">
      <p>&copy; 2024 Coffee Tasting Dashboard. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Example Data Binding -->
  <script>
    // Example JavaScript for Dynamically Injecting Coffee Data
    const coffeeData = {
      coffee_id: "ethiopian_yirgacheffe",
      url: "https://www.sunriseroasters.com",
      name: "Ethiopian Yirgacheffe",
      roaster: "Sunrise Roasters",
      origin: "Ethiopia, Yirgacheffe",
      process_method: "Washed",
      roast_level: "Light",
      flavor_notes: ["Citrus", "Floral", "Bergamot"],
    };

    document.getElementById("coffee-name").innerText = coffeeData.name;
    document.getElementById("coffee-roaster").innerText = coffeeData.roaster;
    document.getElementById("coffee-url").href = coffeeData.url;
    document.getElementById("coffee-origin").innerText = coffeeData.origin;
    document.getElementById("coffee-process").innerText = coffeeData.process_method;
    document.getElementById("coffee-roast-level").innerText = coffeeData.roast_level;

    const flavorNotesList = document.getElementById("flavor-notes");
    flavorNotesList.innerHTML = ""; // Clear any default items
    coffeeData.flavor_notes.forEach((note) => {
      const listItem = document.createElement("li");
      listItem.className = "text-gray-600 py-1";
      listItem.innerText = note;
      flavorNotesList.appendChild(listItem);
    });
  </script>
</body>
</html>
